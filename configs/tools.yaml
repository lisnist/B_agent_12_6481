default_toolset: basic_tools

settings:
  data_root: ../data
  default_workspace_root: data
  workspace_roots:
    data: ../data
    outputs: ../outputs
    memory: ../memory
    prompts: ../prompts
    configs: ../configs
    code: ../code
    skills: ../skills
  retry:
    max_attempts: 2
    recoverable_errors: [OSError, TimeoutError, ConnectionError]
  cache:
    enabled: true
    cacheable_tools: [calculator, file_reader, local_file_search, table_analyzer]

toolsets:
  basic_tools:
    - calculator
    - current_time
    - directory_list
    - file_stat
    - file_reader
    - text_file_writer
    - markdown_file_writer
    - code_file_writer
    - json_file_writer
    - docx_writer
    - table_file_writer
    - web_search
    - local_file_search
    - table_analyzer
    - python_sandbox
  web_tools:
    - web_search

tools:
  calculator:
    module: skills.calculator
    function: calculator
    description: 计算明确的算术表达式，例如加减乘除、括号和幂运算。适合用户给出具体表达式并需要精确数值结果的场景；复杂表格统计优先使用 table_analyzer。
    parameters:
      expression:
        type: string
        description: 由数字和支持的运算符组成的算术表达式。
    required: [expression]
    returns:
      result:
        type: number
        description: 计算结果。

  current_time:
    module: skills.current_time
    function: current_time
    description: 获取当前日期、时间、星期、时间戳或指定时区时间。适合回答“现在几点”“今天日期”“当前时间”等需要实时钟表信息的问题；默认不传 timezone 表示本地时间。
    parameters:
      timezone:
        type: string
        description: 可选时区名称，例如本地、协调世界时、亚洲上海，或类似 +08:00 的固定偏移。
    required: []
    returns:
      timezone: {type: string, description: 解析后的时区标签。}
      iso: {type: string, description: 当前时间的标准时间格式。}
      date: {type: string, description: 当前日期。}
      time: {type: string, description: 当前钟表时间。}
      weekday: {type: string, description: 星期名称。}
      weekday_index: {type: integer, description: 星期序号，周一为 1。}
      utc_offset: {type: string, description: 协调世界时偏移，格式为正负小时分钟。}
      unix_timestamp: {type: integer, description: Unix 时间戳。}
      local_time: {type: string, description: 当前本地时区时间。}
      utc_time: {type: string, description: 当前协调世界时。}

  directory_list:
    module: skills.file_browser
    function: directory_list
    description: 列出允许工作区内某个目录的文件和子目录，类似 ls。用于探路、确认上传文件名、查看目录下有哪些文件；不读取文件正文。若已经知道准确文件路径并需要内容，应使用 file_reader。
    parameters:
      path:
        type: string
        description: 要列出的目录或文件路径。默认 . 表示 data 根目录；可使用 uploads/...、outputs:...、code:... 等允许根目录路径。
      recursive:
        type: boolean
        description: 是否递归列出子目录。默认 false。
      max_depth:
        type: integer
        description: 递归时的最大深度，默认 1，最大 8。
      file_types:
        type: array
        items: {type: string}
        description: 可选文件后缀过滤，例如 ["txt","md","docx"]；目录仍会显示，便于继续探路。
      include_hidden:
        type: boolean
        description: 是否包含以点开头的隐藏路径。默认 false。
      max_entries:
        type: integer
        description: 最多返回条目数，默认 100，最大 500。
    required: []
    returns:
      path: {type: string, description: 被列出的路径。}
      relative_path: {type: string, description: 相对匹配根目录的路径。}
      root_alias: {type: string, description: 匹配到的允许根目录别名。}
      kind: {type: string, description: path 的类型：directory、file、other。}
      recursive: {type: boolean, description: 是否递归。}
      max_depth: {type: integer, description: 最大递归深度。}
      entry_count: {type: integer, description: 返回条目数量。}
      truncated: {type: boolean, description: 是否因为 max_entries 截断。}
      entries: {type: array, description: 文件或目录条目，包含 name、path、relative_path、kind、suffix、size_bytes、modified_time。}

  file_stat:
    module: skills.file_browser
    function: file_stat
    description: 检查允许工作区内某个路径是否存在及其类型，类似 stat。用于读取前确认路径、判断是文件还是目录、查看后缀和大小；不读取文件正文。
    parameters:
      path:
        type: string
        description: 要检查的文件或目录路径，可使用 uploads/...、outputs:...、code:... 等允许根目录路径。
    required: [path]
    returns:
      path: {type: string, description: 被检查路径。}
      relative_path: {type: string, description: 相对匹配根目录的路径。}
      root_alias: {type: string, description: 匹配到的允许根目录别名。}
      exists: {type: boolean, description: 路径是否存在。}
      kind: {type: string, description: 类型：file、directory、other、missing。}
      suffix: {type: string, description: 文件后缀；非文件为空。}
      size_bytes: {type: integer, description: 文件大小；仅文件存在时返回。}
      modified_time: {type: string, description: 修改时间；存在时返回。}
      child_count: {type: integer, description: 目录的直接子项数量；仅目录存在时返回。}
      readable_by_file_reader: {type: boolean, description: 该文件是否可用 file_reader 读取。}
      analyzable_by_table_analyzer: {type: boolean, description: 该文件是否可用 table_analyzer 分析。}
      parent_exists: {type: boolean, description: 路径不存在时，父目录是否存在。}
      parent_path: {type: string, description: 路径不存在时的父目录路径。}

  file_reader:
    module: skills.file_reader
    function: file_reader
    description: 读取一个已知路径文件的正文，类似 cat。支持 txt、md、json、jsonl、csv、tsv、yaml、py、log、docx、pptx；不支持图片、PDF、旧版 doc/ppt、xlsx 或扫描件。不知道文件名时先用 directory_list；只知道关键词时先用 local_file_search。若返回 truncated=true，只表示读取了部分内容，不能声称已读完整文件。
    parameters:
      path:
        type: string
        description: 相对于数据目录的路径，或允许工作区根目录下的别名路径。
      max_chars:
        type: integer
        description: 最多返回的字符数。
      start_line:
        type: integer
        description: 可选起始行号，从 1 开始，用于部分读取。
      end_line:
        type: integer
        description: 可选结束行号，从 1 开始，用于部分读取。
    required: [path]
    returns:
      content: {type: string, description: 文件内容。}
      num_chars: {type: integer, description: 返回的字符数。}
      source: {type: string, description: 规范化后的路径；如果不在数据目录下，会包含根目录别名。}
      relative_path: {type: string, description: 相对匹配根目录的路径。}
      root_alias: {type: string, description: 匹配到的允许根目录别名。}
      suffix: {type: string, description: 文件后缀。}
      line_count: {type: integer, description: 文件总行数。}
      line_start: {type: integer, description: 本次返回内容的起始行。}
      line_end: {type: integer, description: 本次返回内容的结束行。}
      parser: {type: string, description: 使用的解析器。}
      document_type: {type: string, description: 文档类型。}
      slide_count: {type: integer, description: 演示文件的页数；仅适用时返回。}
      truncated: {type: boolean, description: 内容是否被截断。}

  text_file_writer:
    module: skills.file_writer
    function: text_file_writer
    side_effects: true
    description: 当用户明确要求生成或保存 .txt 纯文本文件时使用。只在本次运行的 generated_files 输出目录中创建新文件，不修改已有项目文件，不覆盖同名文件；普通对话、记录、总结或直接回答不需要调用。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须以 .txt 结尾；拒绝绝对路径、空路径段和父目录片段。
      content:
        type: string
        description: 要写入 .txt 文件的完整文本内容。
    required: [filename, content]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 txt。}
      suffix: {type: string, description: 文件后缀，固定为 .txt。}
      num_chars: {type: integer, description: 输入内容字符数。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}

  markdown_file_writer:
    module: skills.file_writer
    function: markdown_file_writer
    side_effects: true
    description: 当用户明确要求生成或保存 Markdown 文档时使用。只创建 .md 文件；不要把普通回答、摘要或列表都自动写成文件，除非用户明确要求导出/保存/生成文件。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须以 .md 结尾；拒绝绝对路径和父目录片段。
      content:
        type: string
        description: 要写入 Markdown 文件的完整内容，可以包含标题、列表、表格和代码块。
    required: [filename, content]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 markdown。}
      suffix: {type: string, description: 文件后缀，固定为 .md。}
      num_chars: {type: integer, description: 输入内容字符数。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}

  code_file_writer:
    module: skills.file_writer
    function: code_file_writer
    side_effects: true
    description: 当用户明确要求生成代码文件、脚本文件或给出具体代码文件名/后缀时使用。只写入代码文本，不执行代码、不安装依赖、不修改项目源文件；支持常见代码后缀如 .py、.cpp、.c、.js、.ts、.tsx、.html、.css、.java、.go、.rs、.sql、.sh、.ps1。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须使用支持的代码后缀；拒绝绝对路径和父目录片段。
      content:
        type: string
        description: 要写入代码文件的完整源码内容。
      language:
        type: string
        description: 可选语言标签，仅用于结果说明，例如 python、cpp、javascript。
    required: [filename, content]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 code。}
      suffix: {type: string, description: 生成文件后缀。}
      num_chars: {type: integer, description: 输入内容字符数。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}
      language: {type: string, description: 可选语言标签；仅在输入提供时返回。}

  json_file_writer:
    module: skills.file_writer
    function: json_file_writer
    side_effects: true
    description: 当用户明确要求生成或导出 JSON 文件时使用。输入必须是结构化 JSON 对象，由工具负责序列化和格式化，避免让模型手写不合法 JSON 字符串。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须以 .json 结尾；拒绝绝对路径和父目录片段。
      data:
        type: object
        description: 要写入文件的 JSON 对象。
    required: [filename, data]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 json。}
      suffix: {type: string, description: 文件后缀，固定为 .json。}
      num_chars: {type: integer, description: 序列化后 JSON 字符数。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}

  docx_writer:
    module: skills.file_writer
    function: docx_writer
    side_effects: true
    description: 当用户明确要求生成 Word 文档或 .docx 文件时使用。输入为纯文本内容，工具会生成最小可打开的 docx 文件；复杂样式、图片、页眉页脚和表格排版不由此工具保证。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须以 .docx 结尾；拒绝绝对路径和父目录片段。
      content:
        type: string
        description: 要写入 Word 文档的完整文本内容；换行会转换为段落。
    required: [filename, content]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 docx。}
      suffix: {type: string, description: 文件后缀，固定为 .docx。}
      num_chars: {type: integer, description: 输入内容字符数。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}

  table_file_writer:
    module: skills.file_writer
    function: table_file_writer
    side_effects: true
    description: 当用户明确要求生成 CSV 或 TSV 表格文件时使用。输入必须包含列名和行数据；不要用于分析已有表格，分析已有表格应使用 table_analyzer。
    parameters:
      filename:
        type: string
        description: 相对输出文件名，必须以 .csv 或 .tsv 结尾；拒绝绝对路径和父目录片段。
      columns:
        type: array
        items: {type: string}
        description: 表头列名数组。
      rows:
        type: array
        description: 数据行数组；每行可以是对象或数组。
    required: [filename, columns, rows]
    returns:
      generated_file_path: {type: string, description: 生成文件的绝对路径。}
      relative_output_path: {type: string, description: 运行输出目录下的相对路径，位于 generated_files 目录内。}
      download_url: {type: string, description: 浏览器可访问的文件下载接口地址。}
      filename: {type: string, description: 唯一性处理后的最终文件名。}
      file_type: {type: string, description: 文件类型，固定为 table。}
      suffix: {type: string, description: 文件后缀，为 .csv 或 .tsv。}
      num_chars: {type: integer, description: 生成文件字符数的近似值。}
      num_bytes: {type: integer, description: 生成文件的字节大小。}
      overwritten: {type: boolean, description: 是否覆盖已有文件；该工具始终不会覆盖。}
      num_rows: {type: integer, description: 写入的数据行数，不含表头。}
      num_columns: {type: integer, description: 写入的列数。}

  local_file_search:
    module: skills.local_file_search
    function: local_file_search
    description: 在允许工作区内按关键词搜索本地文本类文件，类似 grep。用于根据关键词找到可能相关的文件路径和片段；不读取完整正文。列目录用 directory_list；读取确定文件用 file_reader。不能用于网页、互联网、实时新闻或当前外部信息。
    parameters:
      query: {type: string, description: 搜索关键词。}
      root_dir: {type: string, description: 相对于数据目录的目录，或允许工作区根目录下的别名路径。}
      file_types:
        type: array
        items: {type: string}
        description: 需要搜索的文件扩展名。
      top_k: {type: integer, description: 最多返回的匹配数量。}
      max_file_chars: {type: integer, description: 每个文件最多扫描的字符数。}
    required: [query]
    returns:
      query_terms: {type: array, description: 从 query 中解析出的搜索词。}
      root_alias: {type: string, description: 搜索目录匹配到的允许根目录别名。}
      results: {type: array, description: 按相关度排序的路径、片段和分数。}

  web_search:
    module: skills.web_search
    function: web_search
    description: 直接通过 DDGS/DuckDuckGo 进行网页搜索。用于互联网搜索、实时新闻、近期事件、当前外部信息，或本地文件中没有的主题。query 应写成具体搜索词，包含主题、地区、时间范围或信息类型；不要只写“查一下”“实时新闻”等空泛词。该工具只返回搜索结果和链接，不负责打开网页正文。
    parameters:
      query: {type: string, description: 网页搜索关键词。}
      top_k: {type: integer, description: 请求的最大结果数量。}
      search_type:
        type: string
        description: 搜索类型，可选 auto、text、news；实时新闻优先使用 news，不确定时用 auto。
      region:
        type: string
        description: 搜索区域，默认 cn-zh；需要英文或国际结果时可用 us-en。
      timelimit:
        type: string
        description: 可选时间范围：d 表示近一天，w 表示近一周，m 表示近一月，y 表示近一年。
    required: [query]
    returns:
      query: {type: string, description: 原始搜索关键词。}
      requested_top_k: {type: integer, description: 用户请求的结果数量。}
      top_k: {type: integer, description: 实际请求的结果数量。}
      search_type: {type: string, description: 搜索类型。}
      region: {type: string, description: 搜索区域。}
      timelimit: {type: string, description: 搜索时间范围；未设置时为空。}
      category: {type: string, description: 实际执行的搜索类别：text 或 news。}
      backend: {type: string, description: 实际使用的 DDGS 后端。}
      attempt_count: {type: integer, description: 搜索尝试次数。}
      attempts: {type: array, description: 搜索尝试记录，包括类别、后端、结果数量或错误。}
      result_count: {type: integer, description: 返回结果数量。}
      results: {type: array, description: 搜索结果，包含 rank、title、url、source_name、published、snippet、category。}
      text: {type: string, description: 便于模型阅读的搜索结果摘要文本。}

  table_analyzer:
    module: skills.table_analyzer
    function: table_analyzer
    description: 分析已有的本地 CSV、TSV 或 XLSX 表格文件，返回行列数、列名、预览、缺失值和可选数值统计。XLSX 默认分析第一张工作表。不用于生成表格文件；生成 CSV/TSV 应使用 table_file_writer。
    parameters:
      path: {type: string, description: 相对于数据目录的 .csv、.tsv 或 .xlsx 表格路径，或允许工作区根目录下的别名路径。}
      max_rows_preview: {type: integer, description: 预览行数。}
      describe: {type: boolean, description: 是否计算数值统计信息。}
    required: [path]
    returns:
      path: {type: string, description: 规范化后的表格路径；如果不在数据目录下，会包含根目录别名。}
      relative_path: {type: string, description: 相对匹配根目录的路径。}
      root_alias: {type: string, description: 匹配到的允许根目录别名。}
      suffix: {type: string, description: 表格文件后缀。}
      parser: {type: string, description: 使用的解析器；xlsx 时为第一张工作表路径。}
      num_rows: {type: integer, description: 数据行数。}
      num_columns: {type: integer, description: 列数。}
      columns: {type: array, description: 列名。}
      preview: {type: array, description: 前几行预览。}
      column_profiles: {type: object, description: 按列统计的缺失值和唯一值信息。}
      describe: {type: object, description: 按列统计的数值信息。}

  python_sandbox:
    module: skills.python_sandbox
    function: python_sandbox
    side_effects: true
    description: 在独立的本次运行沙箱目录中执行一段 Python 代码，返回 stdout、stderr、退出码、超时状态和诊断信息。调用时必须提供 code 参数。用于验证小段代码、运行轻量计算或观察 Python 报错；不会调用模型，不会修改项目源文件，不用于安装依赖、联网任务或执行不可信攻击代码。运行错误、语法错误、非零退出码和超时会作为正常执行结果返回，便于 Agent 继续分析。默认不会生成前端下载卡片；只有用户明确要求导出或下载执行报告时，才传 export_report=true。
    parameters:
      code:
        type: string
        description: 必填。要执行的完整 Python 代码。工具会写入沙箱目录中的 main.py 后执行。
      stdin:
        type: string
        description: 可选标准输入文本。
      argv:
        type: array
        items: {type: string}
        description: 可选命令行参数数组，会传给 main.py。
      timeout_seconds:
        type: number
        description: 可选超时时间，单位秒；默认 5，最大 20。
      max_output_chars:
        type: integer
        description: stdout 和 stderr 分别最多返回的字符数；默认 6000，最大 20000。
      export_report:
        type: boolean
        description: 是否把执行报告作为可下载文件暴露给前端；默认 false。只有用户明确要求下载、导出或保存执行报告时才设为 true。
    required: [code]
    returns:
      language: {type: string, description: 执行语言，固定为 python。}
      entrypoint: {type: string, description: 沙箱中的入口文件名。}
      command: {type: array, description: 面向日志展示的执行命令。}
      exit_code: {type: integer, description: 进程退出码；非零退出码表示代码运行失败但工具调用本身成功。}
      timed_out: {type: boolean, description: 是否因为 timeout_seconds 超时被终止。}
      timeout_seconds: {type: number, description: 本次执行使用的超时时间。}
      duration_ms: {type: number, description: 执行耗时，单位毫秒。}
      termination_reason: {type: string, description: 终止原因：completed、nonzero_exit 或 timeout。}
      diagnostic: {type: string, description: 工具级诊断信息，用于说明成功、非零退出或超时终止。}
      text: {type: string, description: 便于模型阅读的简短执行结论，综合终止原因、stdout 和 stderr。}
      stdout: {type: string, description: 标准输出，可能按 max_output_chars 截断。}
      stderr: {type: string, description: 标准错误，可能按 max_output_chars 截断。}
      stdout_truncated: {type: boolean, description: stdout 是否被截断。}
      stderr_truncated: {type: boolean, description: stderr 是否被截断。}
      report_saved: {type: boolean, description: 是否已在本地运行目录保存执行报告。}
      report_exported: {type: boolean, description: 是否已把执行报告暴露为前端可下载 artifact。}
      report_filename: {type: string, description: 本地保存的执行报告文件名。}
      sandbox_dir: {type: string, description: 本地沙箱目录。}
      relative_sandbox_dir: {type: string, description: 相对本次运行输出目录的沙箱目录。}
      code_file_path: {type: string, description: 写入后的 Python 源文件路径。}
      relative_code_path: {type: string, description: 相对本次运行输出目录的 Python 源文件路径。}
      num_chars: {type: integer, description: 执行报告 JSON 字符数。}
      num_bytes: {type: integer, description: 执行报告文件字节数。}
      created_files: {type: array, description: 代码执行期间在沙箱目录中生成的文件列表。}
      created_files_truncated: {type: boolean, description: created_files 是否因为数量限制被截断。}
      generated_file_path: {type: string, description: 仅 export_report=true 时返回，执行报告 JSON 的本地路径。}
      relative_output_path: {type: string, description: 仅 export_report=true 时返回，相对本次运行输出目录的执行报告路径。}
      download_url: {type: string, description: 仅 export_report=true 且由 B3 自动补充时返回，浏览器可访问的执行报告下载接口地址。}

